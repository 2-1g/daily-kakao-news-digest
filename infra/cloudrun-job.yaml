apiVersion: run.googleapis.com/v1
kind: Job
metadata:
  name: daily-kakao-news-digest
  annotations:
    run.googleapis.com/launch-stage: BETA
spec:
  template:
    metadata:
      annotations:
        run.googleapis.com/execution-environment: gen2
    spec:
      taskCount: 1
      template:
        spec:
          serviceAccountName: news-digest-runtime@PROJECT_ID.iam.gserviceaccount.com
          maxRetries: 0
          timeoutSeconds: "900"
          containers:
            - image: REGION-docker.pkg.dev/PROJECT_ID/news-digest/app:IMAGE_TAG
              args: ["run"]
              env:
                - name: GOOGLE_CLOUD_PROJECT
                  value: PROJECT_ID
                - name: KAKAO_TOKEN_SECRET
                  value: kakao-token-active
                - name: EDITION_TIMEZONE
                  value: Asia/Seoul
                # No model is called by the current implementation. Add model
                # credentials only after the tested $0.10/run guard exists.
                # Delivery remains a safe dry run until the operator explicitly
                # changes this after the authorized Kakao smoke test.
                - name: NEWS_DIGEST_LIVE_SEND
                  value: "false"
              resources:
                limits:
                  cpu: "1"
                  memory: 512Mi
